<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slip Catat Meter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; color: #0f172a; }
        .mobile-container { max-width: 480px; min-height: 100vh; margin: 0 auto; background-color: #f8fafc; position: relative; box-shadow: 0 0 40px rgba(0, 0, 0, 0.05); overflow: hidden; display: flex; flex-direction: column; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .modern-card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body>
<div class="mobile-container">
    <!-- Modern Header -->
    <div class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center gap-4">
        <a href="mobile_ui.html" class="w-10 h-10 bg-gray-50 hover:bg-gray-100 rounded-full flex items-center justify-center text-gray-700 transition shadow-sm border border-gray-100">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="text-[17px] font-extrabold text-gray-800 tracking-tight">Slip Catat Meter</h1>
    </div>

    <!-- Content -->
    <div class="flex-1 px-5 pt-4 pb-8 flex flex-col gap-5 overflow-y-auto hide-scrollbar">
        
        <!-- Info Card -->
        <div class="modern-card p-5">
            <!-- Logo Right Aligned -->
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xs font-extrabold text-gray-400 uppercase tracking-widest">Detail Slip</h2>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 border border-[#a3cc39] rounded-[40%] flex items-center justify-center bg-white shadow-sm overflow-hidden">
                        <i class="fa-solid fa-water text-[#2a81d4] text-[10px]"></i>
                    </div>
                    <div>
                        <p class="text-[5px] text-gray-500 leading-[0.8] mb-0.5 tracking-wide font-semibold">PERUMDA AIR MINUM</p>
                        <h1 class="text-gray-800 font-extrabold text-[8px] leading-none mb-0.5 tracking-tight">SURYA SEMBADA</h1>
                        <p class="text-[5px] text-gray-500 leading-none tracking-wide font-semibold">KOTA SURABAYA</p>
                    </div>
                </div>
            </div>

            <!-- Info text -->
            <div class="grid grid-cols-[100px_auto] gap-y-2 gap-x-3 text-[11px] font-bold text-gray-600 mb-6 bg-gray-50 p-3 rounded-xl">
                <div class="text-right text-gray-400">Periode :</div><div class="text-gray-800">-</div>
                <div class="text-right text-gray-400">Tanggal catat :</div><div class="text-gray-800">-</div>
                <div class="text-right text-gray-400">Kode tarif :</div><div class="text-gray-800">-</div>
            </div>

            <!-- Table -->
            <div class="border border-gray-100 rounded-xl overflow-hidden shadow-sm">
                <table class="w-full text-[11px]">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600">
                            <th class="py-3 px-4 text-left font-extrabold">Meter Air</th>
                            <th class="py-3 px-4 text-right font-extrabold">Pemakaian (m³)</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-600 bg-white">
                        <tr class="border-b border-gray-50">
                            <td class="py-3 px-4 border-r border-gray-50 font-semibold">Meter Lalu</td>
                            <td class="py-3 px-4 text-right font-bold text-gray-800">0</td>
                        </tr>
                        <tr class="border-b border-gray-50">
                            <td class="py-3 px-4 border-r border-gray-50 font-semibold">Meter Kini</td>
                            <td class="py-3 px-4 text-right font-bold text-gray-800">0</td>
                        </tr>
                        <tr class="bg-[#f8fbff]">
                            <td class="py-3 px-4 border-r border-gray-50 font-extrabold text-[#2a81d4]">Total Pemakaian</td>
                            <td class="py-3 px-4 text-right font-extrabold text-[#2a81d4]">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Form Card -->
        <div class="modern-card p-5 mt-auto">
            <!-- Select Pelanggan -->
            <div class="relative mb-4">
                <label class="block text-gray-400 text-[9px] font-extrabold uppercase tracking-widest mb-2">Pilih Pelanggan</label>
                <select class="w-full appearance-none bg-gray-50 border-0 text-gray-800 text-[13px] font-bold px-4 py-3.5 rounded-xl outline-none focus:ring-2 focus:ring-[#2a81d4]/30 transition shadow-inner">
                    <option>Nomor Pelanggan</option>
                </select>
                <i class="fa-solid fa-chevron-down text-gray-400 absolute right-4 bottom-4 pointer-events-none text-[11px]"></i>
            </div>
            
            <!-- Periode Button -->
            <div class="mb-5">
                <label class="block text-gray-400 text-[9px] font-extrabold uppercase tracking-widest mb-2">Periode</label>
                <button class="w-full bg-[#f8fbff] text-[#2a81d4] text-[13px] font-extrabold px-4 py-3.5 rounded-xl flex justify-between items-center shadow-inner border border-[#b3d4f5]">
                    <span>Pilih periode</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
            
            <button class="w-full bg-[#2a81d4] hover:bg-[#1f6db8] text-white text-[13px] font-extrabold py-3.5 rounded-2xl shadow-[0_8px_20px_rgba(42,129,212,0.25)] hover:shadow-[0_4px_10px_rgba(42,129,212,0.2)] transition-all">
                Submit
            </button>
        </div>
    </div>
</div>
</body>
</html>
