<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Pasang Baru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; color: #0f172a; }
        .mobile-container { max-width: 480px; min-height: 100vh; margin: 0 auto; background-color: #f8fafc; position: relative; box-shadow: 0 0 40px rgba(0, 0, 0, 0.05); overflow: hidden; display: flex; flex-direction: column; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .modern-card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body>
<div class="mobile-container">
    <!-- Modern Header -->
    <div class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center gap-4">
        <a href="mobile_ui.html" class="w-10 h-10 bg-gray-50 hover:bg-gray-100 rounded-full flex items-center justify-center text-gray-700 transition shadow-sm border border-gray-100">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="text-[17px] font-extrabold text-gray-800 tracking-tight">Monitoring Pasang Baru</h1>
    </div>

    <!-- Content -->
    <div class="flex-1 px-5 pt-6 pb-8 flex flex-col gap-4 overflow-y-auto hide-scrollbar">
        
        <div class="modern-card p-4 flex gap-3 shadow-sm">
            <input type="text" placeholder="Nomor pasang baru / nomor telepon Anda" class="flex-1 appearance-none bg-gray-50 border border-gray-200 text-gray-800 text-[12px] font-bold px-4 py-3.5 rounded-xl outline-none focus:ring-2 focus:ring-[#2a81d4]/30 focus:border-[#2a81d4] transition shadow-inner">
            <button class="w-12 h-12 bg-[#2a81d4] hover:bg-[#1f6db8] text-white rounded-xl flex items-center justify-center shadow-md shadow-blue-500/20 transition flex-shrink-0">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        
        <!-- Empty state illustrative -->
        <div class="flex-1 flex flex-col items-center justify-center mt-20 opacity-60">
            <i class="fa-solid fa-magnifying-glass-location text-6xl text-gray-300 mb-4"></i>
            <p class="text-xs font-semibold text-gray-400 text-center max-w-[200px]">Masukkan nomor pasang baru atau nomor telepon untuk melihat status.</p>
        </div>

    </div>
</div>
</body>
</html>
