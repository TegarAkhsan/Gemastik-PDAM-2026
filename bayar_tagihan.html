<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayar Tagihan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; color: #0f172a; }
        .mobile-container { max-width: 480px; min-height: 100vh; margin: 0 auto; background-color: #f8fafc; position: relative; box-shadow: 0 0 40px rgba(0, 0, 0, 0.05); overflow: hidden; display: flex; flex-direction: column; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .modern-card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body>
<div class="mobile-container">
    <!-- Modern Header -->
    <div class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center gap-4">
        <a href="mobile_ui.html" class="w-10 h-10 bg-gray-50 hover:bg-gray-100 rounded-full flex items-center justify-center text-gray-700 transition shadow-sm border border-gray-100">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="text-[17px] font-extrabold text-gray-800 tracking-tight">Bayar Tagihan</h1>
    </div>

    <!-- Content -->
    <div class="flex-1 px-5 pt-4 pb-8 flex flex-col gap-4 overflow-y-auto hide-scrollbar">
        
        <!-- Toggle Tabs -->
        <div class="bg-gray-100/80 p-1.5 rounded-[18px] flex items-center mx-auto w-full max-w-[280px] border border-gray-200/50">
            <button class="flex-1 bg-white text-[#2a81d4] text-[11px] font-bold py-2.5 rounded-2xl shadow-sm transition">Rekening</button>
            <button class="flex-1 text-gray-500 hover:text-gray-700 text-[11px] font-semibold py-2.5 rounded-2xl transition">Non Rekening</button>
        </div>

        <!-- Form Cari Tagihan -->
        <div class="modern-card p-4 mt-2">
            <!-- Select Pelanggan -->
            <div class="relative mb-3">
                <select class="w-full appearance-none bg-gray-50 border border-gray-100 text-gray-800 text-[12px] font-bold px-4 py-3 rounded-xl outline-none focus:ring-2 focus:ring-[#2a81d4]/30 transition shadow-inner">
                    <option>Pilih nomor pelanggan</option>
                </select>
                <i class="fa-solid fa-chevron-down text-gray-400 absolute right-4 top-1/2 transform -translate-y-1/2 pointer-events-none text-[11px]"></i>
            </div>
            
            <div class="flex gap-2">
                <!-- Select Periode -->
                <button class="flex-1 bg-[#2a81d4] text-white text-[12px] font-bold px-4 py-3 rounded-xl flex justify-between items-center shadow-md shadow-blue-500/20">
                    <span>Pilih periode</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                <!-- Btn Cek Tagihan -->
                <button class="bg-[#84cc16] hover:bg-[#65a30d] text-white text-[12px] font-extrabold px-5 py-3 rounded-xl transition shadow-md shadow-green-500/20">
                    Cek Tagihan
                </button>
            </div>
        </div>

        <!-- Tagihan Card -->
        <div class="modern-card p-5 mt-2 relative">
            <!-- Logo Right Aligned -->
            <div class="flex justify-end mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 border border-[#a3cc39] rounded-[40%] flex items-center justify-center bg-white shadow-sm overflow-hidden">
                        <i class="fa-solid fa-water text-[#2a81d4] text-[10px]"></i>
                    </div>
                    <div>
                        <p class="text-[5px] text-gray-500 leading-[0.8] mb-0.5 tracking-wide font-semibold">PERUMDA AIR MINUM</p>
                        <h1 class="text-gray-800 font-extrabold text-[8px] leading-none mb-0.5 tracking-tight">SURYA SEMBADA</h1>
                        <p class="text-[5px] text-gray-500 leading-none tracking-wide font-semibold">KOTA SURABAYA</p>
                    </div>
                </div>
            </div>

            <!-- Info text -->
            <div class="grid grid-cols-[90px_auto] gap-y-1.5 gap-x-3 text-[11px] font-bold text-gray-600 mb-5 pl-2">
                <div class="text-gray-500">Periode :</div><div class="text-gray-800">-</div>
                <div class="text-gray-500">Periode Bayar :</div><div class="text-gray-800">-</div>
                <div class="text-gray-500">Kode tarif :</div><div class="text-gray-800">-</div>
            </div>

            <!-- Table -->
            <div class="border border-gray-100 rounded-xl overflow-hidden shadow-sm mb-4">
                <table class="w-full text-[11px]">
                    <thead>
                        <tr class="bg-gray-700 text-white">
                            <th class="py-2.5 px-4 text-left font-bold">Meter Air</th>
                            <th class="py-2.5 px-4 text-right font-bold">Pemakaian (m³)</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-600 bg-white">
                        <tr class="border-b border-gray-50">
                            <td class="py-2.5 px-4 border-r border-gray-50">Meter Lalu</td>
                            <td class="py-2.5 px-4 text-right">0</td>
                        </tr>
                        <tr class="border-b border-gray-50">
                            <td class="py-2.5 px-4 border-r border-gray-50">Meter Kini</td>
                            <td class="py-2.5 px-4 text-right">0</td>
                        </tr>
                        <tr>
                            <td class="py-2.5 px-4 border-r border-gray-50 font-semibold text-gray-800">Total Pemakaian</td>
                            <td class="py-2.5 px-4 text-right font-semibold text-gray-800">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Detail link -->
            <div class="flex justify-end mb-6">
                <a href="#" class="text-[10px] text-[#2a81d4] font-bold underline decoration-blue-200 underline-offset-2">Lihat detail tagihan</a>
            </div>

            <!-- Total -->
            <div class="flex justify-between items-center bg-[#f8fafc] p-4 rounded-xl border border-gray-100">
                <span class="text-gray-500 text-[11px] font-extrabold uppercase tracking-widest">Total Tagihan</span>
                <span class="text-gray-900 text-[16px] font-black">Rp. 0</span>
            </div>
        </div>

    </div>
</div>
</body>
</html>
